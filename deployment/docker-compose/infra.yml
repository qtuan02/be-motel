name: "motel"
services:
  user-db:
    image: postgres:18-alpine
    container_name: user-db
    environment:
      - POSTGRES_DB=user-db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin@123
    ports:
      - "15432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 500m

