version: "3"

vars:
  GOOS: "{{default OS .GOOS}}"
  # MVNW: '{{if eq .GOOS "windows"}}mvnw.cmd{{else}}./mvnw{{end}}' <- Mac OS
  MVNW: '{{if eq .GOOS "windows"}}cmd /c mvnw.cmd{{else}}./mvnw{{end}}'
  DC_DIR: "deployment/docker-compose"
  INFRA_DC_FILE: "{{.DC_DIR}}/infra.yml"
  SLEEP_CMD: '{{if eq .GOOS "windows"}}timeout{{else}}sleep{{end}}'

tasks:
  format:
    cmds:
      - "{{.MVNW}} spotless:check"

  format_fix:
    cmds:
      - "{{.MVNW}} spotless:apply"

  # build:
  #   cmds:
  #     - "{{.MVNW}} -pl user-service spring-boot:build-image -DskipTests"

  start_infra:
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} up -d"

  stop_infra:
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} stop"
      - "docker compose -f {{.INFRA_DC_FILE}} rm -f"

  restart_infra:
    cmds:
      - task: stop_infra
      - task: sleep
      - task: start_infra

  sleep:
    vars:
      DURATION: "{{default 5 .DURATION}}"
    cmds:
      - "{{.SLEEP_CMD}} {{.DURATION}}"

  build_shared:
    cmds:
      - "{{.MVNW}} -pl shared -am clean install -DskipTests"

  run_service:
    internal: true
    dir: "{{.DIR}}"
    cmds:
      - "{{.MVNW}} spring-boot:run"

  run_user:
    cmds:
      - task: build_shared
      - task: run_service
        vars: { DIR: "user-service" }
